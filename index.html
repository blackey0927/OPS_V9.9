         (event.ctrlKey && event.keyCode === 85)) {

  </div>

<div id="ops-app-root"></div>

<script>
const FORMSPREE_ID = "mqeyppjp";
const _k = () => ["36","53","6f","4a","7a","37","30","39","40","37"].map(x=>String.fromCharCode(parseInt(x,16))).join('');

window.addEventListener('DOMContentLoaded', () => {
  if (window.OPS_DB && Object.keys(window.OPS_DB).length > 0) {
    document.getElementById('lock-ui').style.display = 'none';
    document.getElementById('ops-app-root').style.display = 'block';
    setTimeout(() => { if(window.launchOPSApp) window.launchOPSApp(); }, 100);
    return;
  }
  const savedEmail = localStorage.getItem('ops_user_email');
  const savedPw = localStorage.getItem('ops_user_pw');
  if (savedEmail && savedPw) {
    document.getElementById('u-email').value = savedEmail;
    document.getElementById('u-pw').value = savedPw;
    doUnlock(true);
  }
});

function switchTab(t) {
  document.getElementById('panel-unlock').style.display = t === 'unlock' ? 'block' : 'none';
  document.getElementById('panel-req').style.display = t === 'req' ? 'block' : 'none';
  document.getElementById('tab-u').className = t === 'unlock' ? 'tab-btn active' : 'tab-btn';
  document.getElementById('tab-r').className = t === 'req' ? 'tab-btn active' : 'tab-btn';
}

function sendReq() {
  const email = document.getElementById('r-email').value;
  const name = document.getElementById('r-name').value;
  if(!email.includes('@')) return alert('請輸入正確 Email');
  fetch(`https://formspree.io/f/${FORMSPREE_ID}`, {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ email: email, name: name, message: "請求 OPS 系統開通權限" })
  }).then(() => alert("✅ 申請已送出！請等待獻爸發放專屬密碼。"));
}

function b64ToBytes(b64){
  const bin = atob(b64); const b = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) b[i] = bin.charCodeAt(i); return b;
}

async function doUnlock(isAutoLogin = false) {
  const email = document.getElementById('u-email').value.trim().toLowerCase();
  const pw = document.getElementById('u-pw').value.trim().toUpperCase();
  const btn = document.getElementById('unlock-btn');
  if(!email || !pw) return !isAutoLogin && alert("請填寫完整資訊！");

  btn.innerText = "驗證與解密中..."; btn.disabled = true;

  try {
    const enc = new TextEncoder();
    const keyMatHMAC = await crypto.subtle.importKey('raw', enc.encode(_k()), {name:'HMAC',hash:'SHA-256'}, false, ['sign']);
    const sig = await crypto.subtle.sign('HMAC', keyMatHMAC, enc.encode(email));
    const expected = Array.from(new Uint8Array(sig)).map(b=>b.toString(16).padStart(2,'0')).join('').substring(0,10).toUpperCase();
    
    if(pw !== expected) { 
      btn.innerText = "解鎖進入系統"; btn.disabled = false; 
      localStorage.removeItem('ops_user_pw'); 
      return !isAutoLogin && alert("❌ 信箱或密碼錯誤！"); 
    }

    const response = await fetch('./database_secured.txt');
    if(!response.ok) throw new Error("找不到加密數據庫");
    const encryptedData = await response.json();

    const salt = b64ToBytes(encryptedData.salt);
    const nonce = b64ToBytes(encryptedData.nonce);
    const ct = b64ToBytes(encryptedData.ct);
    
    const keyMatAES = await crypto.subtle.importKey('raw', enc.encode(_k()), 'PBKDF2', false, ['deriveKey']);
    const key = await crypto.subtle.deriveKey({name:'PBKDF2', salt, iterations:310000, hash:'SHA-256'}, keyMatAES, {name:'AES-GCM', length:256}, false, ['decrypt']);
    const decrypted = await crypto.subtle.decrypt({name:'AES-GCM', iv:nonce}, key, ct);
    const dbScriptText = new TextDecoder().decode(decrypted);
    
    const scriptEl = document.createElement('script');
    scriptEl.textContent = dbScriptText;
    document.body.appendChild(scriptEl);

    localStorage.setItem('ops_user_email', email);
    localStorage.setItem('ops_user_pw', pw);

    document.getElementById('lock-ui').style.display = 'none';
    document.getElementById('ops-app-root').style.display = 'block';
    
    if(window.launchOPSApp) window.launchOPSApp();

  } catch(e) {
    console.error(e);
    btn.innerText = "解鎖進入系統"; btn.disabled = false;
    if(!isAutoLogin) alert("❌ 解密失敗！請確認資料庫檔案是否已正確上傳至 GitHub。");
  }
}
</script>

                  {GEMINI_BASE.map(item=>{
                    const on = selGeminiBase.includes(item.id);
                    return <button key={item.id} onClick={()=>setSelGeminiBase(p=>on?p.filter(k=>k!==item.id):[...p,item.id])} style={{ background:on?`${C.cloud}33`:"var(--card)", border:`1px solid ${on?C.cloud:"var(--border)"}`, color:on?C.cloud:"var(--text)", padding:"4px 9px",borderRadius:13,fontSize:11,cursor:"pointer",fontWeight:on?700:400 }}>{on?"✓ ":""}{item.label}</button>;
                  })}
                </div>

                <div style={{fontSize:10,color:"var(--subtext)",marginBottom:4}}>鏡頭語言與焦段 (單選)</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:12}}>
                  {GEMINI_LENS.map(item=><SelBtn key={item.id} item={item} selected={selGeminiLens} onSelect={id=>setSelGeminiLens(p=>p===id?null:id)} color={C.cloud}/>)}
                </div>

                <div style={{fontSize:10,color:C.rose,marginBottom:4,fontWeight:"bold"}}>🎬 連續生圖專用指令 (延續上圖 / 單選)</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                  {GEMINI_CONT.map(item=><SelBtn key={item.id} item={item} selected={selGeminiCont} onSelect={id=>setSelGeminiCont(p=>p===id?null:id)} color={C.rose}/>)}
                </div>
              </div>
            </div>

            <button onClick={gen} disabled={loading} style={{width:"100%",padding:16,background:loading?"var(--border)":isCloudMode?`linear-gradient(135deg,${C.cloud},${C.cyan})`:`linear-gradient(135deg,${C.cyan},${C.purple})`,border:"none",borderRadius:10,color:"#fff",fontSize:16,fontWeight:800,letterSpacing:3,cursor:loading?"not-allowed":"pointer",marginBottom:12}}>
              {loading?"⟳ 生成中...":isCloudMode?"◈ 產生雲端安全咒語 (隱性浮雕破防機制)":"◈ 產生本地硬核咒語 (注入 1.5 標籤破壁)"}
            </button>

            {result&&<div>
              <div style={{fontSize:11, color:isCloudMode?C.cloud:C.green, marginBottom:8, letterSpacing:1}}>{isCloudMode ? "☁️ 已啟用雲端破防模式：自動掛載隱性浮雕微陰影咒語" : "✔ 已自動植入: sks_salon, sks_je, IPD 1:1, 滿血物理張力詞"}</div>
              <PromptCard title="＋ 正向提示詞 POSITIVE" titleColor={isCloudMode?C.cloud:C.green} content={prompts.pos} onExpand={lang=>handleExpand("pos",lang)} expanding={expandingState.pos_zh||expandingState.pos_en} onActionSend={(txt, lang) => isCloudMode ? handleCloudGenerate(txt) : handleComfySend(txt, prompts.neg[lang])} isCloudMode={isCloudMode} isComfyGenerating={isComfyGenerating} C={C}/>
              <PromptCard title="－ 負向提示詞 NEGATIVE" titleColor={C.red} content={prompts.neg} C={C}/>
              {selChars.map(charId => {
                  const p = prompts[charId]; const ch = mergedChars[charId]; if (!p || (!p.zh && !p.en)) return null;
                  return <PromptCard key={charId} title={`◆ ${ch.name}`} titleColor={ch.color} content={p} onExpand={lang=>handleExpand(charId,lang)} expanding={expandingState[`${charId}_zh`]||expandingState[`${charId}_en`]} onActionSend={(txt, lang) => isCloudMode ? handleCloudGenerate(txt) : handleComfySend(txt, prompts.neg[lang])} isCloudMode={isCloudMode} isComfyGenerating={isComfyGenerating} C={C}/>;
              })}
              <CopyAll prompts={prompts} selChars={selChars} mergedChars={mergedChars} title={`${result.title_zh} / ${result.title_en}`} C={C}/>
            </div>}

            {/* 🎨 算圖結果動態顯示區域 */}
            {(isComfyGenerating || comfyImages.length > 0) && (
              <div ref={comfyGalleryRef} style={{marginTop:24, padding:20, background:"var(--card)", border:`1px solid ${isCloudMode ? C.cloud : C.green}`, borderRadius:12, boxShadow:`0 10px 30px ${isCloudMode ? C.cloud : C.green}1A`}}>
                <div style={{display:"flex", alignItems:"center", gap:8, marginBottom:16}}>
                   <span style={{fontSize:20}}>{isCloudMode ? "☁️" : "🎨"}</span>
                   <span style={{color:isCloudMode ? C.cloud : C.green, fontWeight:800, fontSize:15, letterSpacing:1}}>
                     {isCloudMode ? "Google Imagen 3 雲端算圖引擎" : "ComfyUI 本地即時算圖引擎"}
                   </span>
                </div>
                {isComfyGenerating && (
                  <div style={{marginBottom: 10}}>
                    <div style={{display:"flex", justifyContent:"space-between", fontSize:12, color:"var(--subtext)", marginBottom:8, fontWeight:"bold"}}>
                      <span style={{color: isCloudMode ? C.cloud : C.green}}>{isCloudMode ? "⚡ 正在呼叫 Google API，請稍候..." : "⚡ 正在與 RTX 5090 伺服器通訊，渲染處理中..."}</span>
                      <span>{comfyProgress}%</span>
                    </div>
                    <div style={{width:"100%", height:8, background:`${isCloudMode ? C.cloud : C.green}1A`, borderRadius:4, overflow:"hidden", border:`1px solid ${isCloudMode ? C.cloud : C.green}4D`}}>
                      <div style={{width:`${comfyProgress}%`, height:"100%", background:isCloudMode ? C.cloud : C.green, transition:"width 0.3s ease-out", boxShadow:`0 0 10px ${isCloudMode ? C.cloud : C.green}CC`}}></div>
                    </div>
                  </div>
                )}
                {comfyImages.length > 0 && (
                  <div style={{display:"flex", gap:12, overflowX:"auto", paddingBottom:10}}>
                    {comfyImages.map((src, idx) => (
                      <div key={idx} className="comfy-image" style={{position:"relative", flexShrink:0}}>
                         <img src={src} style={{height: 450, borderRadius:8, border:`2px solid var(--border)`, objectFit:"contain", background:"#000", boxShadow:"0 5px 15px rgba(0,0,0,0.5)", display:"block"} } alt={`Generated ${idx}`} />
                         <div style={{position:"absolute", top:10, right:10, background:"rgba(0,0,0,0.7)", padding:"4px 8px", borderRadius:4, color:isCloudMode ? C.cloud : C.green, fontSize:10, fontWeight:"bold", border:`1px solid ${isCloudMode ? C.cloud : C.green}`}}>✓ 渲染完成</div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}
          </div>
        </div>
      </>;
    }
    const root = ReactDOM.createRoot(document.getElementById('ops-app-root'));
    root.render(<App />);
  };
</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => console.log('APP 服務註冊成功！', reg.scope))
        .catch(err => console.log('APP 服務註冊失敗：', err));
    });
  }
</script>
</body>
</html>
