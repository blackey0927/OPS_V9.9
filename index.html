    </div>
    <div id="panel-req" style="display:none;">

<div id="ops-app-root"></div>

<script>
const FORMSPREE_ID = "mqeyppjp";
// OPS 系統專屬主金鑰（與 Prompt_V7_6 不同，密碼互不通用）
const _k = () => ["36","53","6f","6a","5a","37","30","39","32","26"].map(x=>String.fromCharCode(parseInt(x,16))).join('');

window.addEventListener('DOMContentLoaded', () => {
  if (window.OPS_DB && Object.keys(window.OPS_DB).length > 0) {
    document.getElementById('lock-ui').style.display = 'none';
    document.getElementById('ops-app-root').style.display = 'block';
    setTimeout(() => { if(window.launchOPSApp) window.launchOPSApp(); }, 100);
    return;
  }
  const savedEmail = localStorage.getItem('ops_user_email');
  const savedPw = localStorage.getItem('ops_user_pw');
  if (savedEmail && savedPw) {
    document.getElementById('u-email').value = savedEmail;
    document.getElementById('u-pw').value = savedPw;
    doUnlock(true);
  }
});

function switchTab(t) {
  document.getElementById('panel-unlock').style.display = t === 'unlock' ? 'block' : 'none';
  document.getElementById('panel-req').style.display = t === 'req' ? 'block' : 'none';
  document.getElementById('tab-u').className = t === 'unlock' ? 'tab-btn active' : 'tab-btn';
  document.getElementById('tab-r').className = t === 'req' ? 'tab-btn active' : 'tab-btn';
}

function sendReq() {
  const email = document.getElementById('r-email').value;
  const name = document.getElementById('r-name').value;
  if(!email.includes('@')) return alert('請輸入正確 Email');
  fetch(`https://formspree.io/f/${FORMSPREE_ID}`, {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ email: email, name: name, message: "請求 OPS 系統開通權限" })
  }).then(() => alert("✅ 申請已送出！請等待獻爸發放專屬密碼。"));
}

function b64ToBytes(b64){
  const bin = atob(b64); const b = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) b[i] = bin.charCodeAt(i); return b;
}

async function doUnlock(isAutoLogin = false) {
  const email = document.getElementById('u-email').value.trim().toLowerCase();
  const pw = document.getElementById('u-pw').value.trim().toUpperCase();
  const btn = document.getElementById('unlock-btn');
  if(!email || !pw) return !isAutoLogin && alert("請填寫完整資訊！");

  btn.innerText = "驗證與解密中..."; btn.disabled = true;

  try {
    const enc = new TextEncoder();
    const keyMatHMAC = await crypto.subtle.importKey('raw', enc.encode(_k()), {name:'HMAC',hash:'SHA-256'}, false, ['sign']);
    const sig = await crypto.subtle.sign('HMAC', keyMatHMAC, enc.encode(email));
    const expected = Array.from(new Uint8Array(sig)).map(b=>b.toString(16).padStart(2,'0')).join('').substring(0,10).toUpperCase();
    
    if(pw !== expected) { 
      btn.innerText = "解鎖進入系統"; btn.disabled = false; 
      localStorage.removeItem('ops_user_pw'); 
      return !isAutoLogin && alert("❌ 信箱或密碼錯誤！"); 
    }

    const response = await fetch('./database_secured.txt');
    if(!response.ok) throw new Error("找不到加密數據庫");
    const encryptedData = await response.json();

    const salt = b64ToBytes(encryptedData.salt);
    const nonce = b64ToBytes(encryptedData.nonce);
    const ct = b64ToBytes(encryptedData.ct);
    
    const keyMatAES = await crypto.subtle.importKey('raw', enc.encode(_k()), 'PBKDF2', false, ['deriveKey']);
    const key = await crypto.subtle.deriveKey({name:'PBKDF2', salt, iterations:310000, hash:'SHA-256'}, keyMatAES, {name:'AES-GCM', length:256}, false, ['decrypt']);
    const decrypted = await crypto.subtle.decrypt({name:'AES-GCM', iv:nonce}, key, ct);
    const dbScriptText = new TextDecoder().decode(decrypted);
    
    const scriptEl = document.createElement('script');
    scriptEl.textContent = dbScriptText;
    document.body.appendChild(scriptEl);

    localStorage.setItem('ops_user_email', email);
    localStorage.setItem('ops_user_pw', pw);

    // ── Airtable 追蹤記錄（靜默執行）──
    (async () => {
      try {
        const AT = window._OPS_AT_CONFIG;
        if(!AT || !AT.token || !AT.baseId || AT.token === 'YOUR_AIRTABLE_PAT') return;
        const base = `https://api.airtable.com/v0/${AT.baseId}`;
        const hdr  = { 'Authorization':`Bearer ${AT.token}`, 'Content-Type':'application/json' };
        const now  = new Date().toISOString();
        const dev  = navigator.userAgent.split(' ').slice(-3).join(' ');
        await fetch(`${base}/unlock_logs`, {
          method:'POST', headers: hdr,
          body: JSON.stringify({ fields:{ email, unlocked_at: now, device: dev, system: 'OPS' } })
        });
        const search = await fetch(`${base}/authorized_users?filterByFormula=${encodeURIComponent(`{email}="${email}"`)}`, { headers: hdr });
        const data = await search.json();
        if(data.records?.length > 0){
          const rec = data.records[0];
          await fetch(`${base}/authorized_users/${rec.id}`, {
            method:'PATCH', headers: hdr,
            body: JSON.stringify({ fields:{ use_count: (rec.fields.use_count||0)+1, last_use: now }})
          });
        }
      } catch(e){ /* 靜默失敗 */ }
    })();

    document.getElementById('lock-ui').style.display = 'none';
    document.getElementById('ops-app-root').style.display = 'block';
    
    if(window.launchOPSApp) window.launchOPSApp();

  } catch(e) {
    console.error(e);
    btn.innerText = "解鎖進入系統"; btn.disabled = false;
    if(!isAutoLogin) alert("❌ 解密失敗！請確認資料庫檔案是否已正確上傳至 GitHub。");
  }
}
</script>

                {isComfyGenerating && (
                  <div style={{marginBottom:10}}>
                    <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:"var(--subtext)",marginBottom:8,fontWeight:"bold"}}>
                      <span style={{color:isCloudMode?C.cloud:isRunningHubMode?C.rhGold:C.green}}>
                        {isCloudMode?"⚡ 正在呼叫 Google API...":isRunningHubMode?(rhQueueStatus||"⚡ 正在呼叫 RunningHub Z-image，每4秒輪詢..."):"⚡ 正在與 RTX 5090 伺服器通訊..."}
                      </span>
                      <span>{comfyProgress}%</span>
                    </div>
                    <div style={{width:"100%",height:8,background:`${isCloudMode?C.cloud:isRunningHubMode?C.rhGold:C.green}1A`,borderRadius:4,overflow:"hidden",border:`1px solid ${isCloudMode?C.cloud:isRunningHubMode?C.rhGold:C.green}4D`}}>
                      <div style={{width:`${comfyProgress}%`,height:"100%",background:isCloudMode?C.cloud:isRunningHubMode?C.rhGold:C.green,transition:"width 0.3s ease-out"}}></div>
                    </div>
                  </div>
                )}
                {comfyImages.length > 0 && (
                  <div style={{display:"flex",gap:12,overflowX:"auto",paddingBottom:10}}>
                    {comfyImages.map((src, idx) => {
                      const ac = isCloudMode?C.cloud:isRunningHubMode?C.rhGold:C.green;
                      const isUrl = src.startsWith("http");
                      const fn = `OPS_Z-image_${new Date().toISOString().slice(0,10)}_${idx+1}.png`;

                      // 存檔：手機用 Web Share API，桌機用 a.download
                      const doSave = async (e) => {
                        const btn = e.currentTarget;
                        btn.textContent = "⟳ 處理中..."; btn.disabled = true;
                        try {
                          // 先取得 blob
                          let blob;
                          if (isUrl) {
                            const res = await fetch(src);
                            if (!res.ok) throw new Error("fetch failed");
                            blob = await res.blob();
                          } else {
                            const b64 = src.split(",")[1];
                            const bin = atob(b64); const arr = new Uint8Array(bin.length);
                            for (let i=0;i<bin.length;i++) arr[i]=bin.charCodeAt(i);
                            blob = new Blob([arr], {type:"image/png"});
                          }

                          const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

                          // 手機：優先用 Web Share API（直接存相簿）
                          if (isMobile && navigator.canShare) {
                            const file = new File([blob], fn, {type: "image/png"});
                            if (navigator.canShare({files:[file]})) {
                              await navigator.share({
                                files: [file],
                                title: "OPS 出圖",
                              });
                              btn.textContent = "✓ 已分享";
                              setTimeout(()=>{ btn.textContent = "⬇ 存圖"; btn.disabled = false; }, 2000);
                              return;
                            }
                          }

                          // 桌機 or 手機不支援 Share：用 a.download
                          const u = URL.createObjectURL(blob);
                          const a = document.createElement("a");
                          a.href = u; a.download = fn; a.click();
                          setTimeout(()=> URL.revokeObjectURL(u), 3000);
                          btn.textContent = "✓ 已存檔";
                          setTimeout(()=>{ btn.textContent = "⬇ 存圖"; btn.disabled = false; }, 2000);

                        } catch(err) {
                          // 最終 fallback：新分頁開啟長按存圖
                          window.open(src, "_blank");
                          btn.textContent = "⬇ 存圖";
                          btn.disabled = false;
                        }
                      };

                      // 複製圖片：fetch→blob→ClipboardItem，可直接 Ctrl+V 貼圖
                      const doCopy = async (e) => {
                        const btn = e.currentTarget;
                        btn.textContent = "⟳ 複製中..."; btn.disabled = true;
                        try {
                          let blob;
                          if (isUrl) {
                            const res = await fetch(src);
                            if (!res.ok) throw new Error("fetch failed");
                            blob = await res.blob();
                          } else {
                            const b64 = src.split(",")[1];
                            const bin = atob(b64); const arr = new Uint8Array(bin.length);
                            for (let i=0;i<bin.length;i++) arr[i]=bin.charCodeAt(i);
                            blob = new Blob([arr], {type:"image/png"});
                          }
                          await navigator.clipboard.write([new ClipboardItem({"image/png": blob})]);
                          setCopiedIdx(idx);
                          btn.textContent = "✓ 已複製圖片";
                          setTimeout(()=>{ setCopiedIdx(null); btn.textContent = "⎘ 複製圖片"; btn.disabled = false; }, 2500);
                        } catch(err) {
                          // CORS 或剪貼簿 API 失敗 → fallback 複製網址
                          try { await navigator.clipboard.writeText(src); btn.textContent = "✓ 已複製網址(fallback)"; }
                          catch(_) { btn.textContent = "⎘ 複製圖片"; }
                          btn.disabled = false;
                          setTimeout(()=>{ btn.textContent = "⎘ 複製圖片"; btn.disabled = false; }, 2500);
                        }
                      };

                      return (
                        <div key={idx} className="comfy-image" style={{flexShrink:0,display:"flex",flexDirection:"column"}}>
                          <div style={{position:"relative"}}>
                            <img src={src} style={{height:450,borderRadius:"8px 8px 0 0",border:`2px solid var(--border)`,borderBottom:"none",objectFit:"contain",background:"#000",boxShadow:"0 5px 15px rgba(0,0,0,0.5)",display:"block"}} alt={`Generated ${idx+1}`} />
                            <div style={{position:"absolute",top:8,right:8,background:"rgba(0,0,0,0.75)",padding:"3px 8px",borderRadius:4,color:ac,fontSize:10,fontWeight:"bold",border:`1px solid ${ac}`}}>✓ 渲染完成</div>
                          </div>
                          <div style={{display:"flex",borderRadius:"0 0 8px 8px",overflow:"hidden",border:`2px solid var(--border)`,borderTop:`1px solid ${ac}40`}}>
                            <button onClick={doCopy} style={{flex:1,padding:"9px 4px",background:copiedIdx===idx?`${ac}30`:"rgba(0,0,0,0.7)",border:"none",borderRight:`1px solid ${ac}30`,color:copiedIdx===idx?ac:"var(--text)",fontSize:12,cursor:"pointer",fontWeight:700,transition:"all 0.15s"}}>
                              ⎘ 複製圖片
                            </button>
                            <button onClick={doSave} style={{flex:1,padding:"9px 4px",background:"rgba(0,0,0,0.7)",border:"none",color:"var(--text)",fontSize:12,cursor:"pointer",fontWeight:700,transition:"background 0.15s"}}
                              onMouseEnter={e=>e.currentTarget.style.background=`${ac}22`}
                              onMouseLeave={e=>e.currentTarget.style.background="rgba(0,0,0,0.7)"}
                            >{/Mobi|Android|iPhone|iPad/i.test(navigator.userAgent) ? "⬆ 分享/存圖" : "⬇ 存檔下載"}</button>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            )}
          </div>
        </div>
      </>;
    }
    const root = ReactDOM.createRoot(document.getElementById('ops-app-root'));
    root.render(<App />);
  };
</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => console.log('APP 服務註冊成功！', reg.scope))
        .catch(err => console.log('APP 服務註冊失敗：', err));
    });
  }
</script>
</body>
</html>
